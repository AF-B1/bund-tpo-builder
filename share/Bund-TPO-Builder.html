<!DOCTYPE html>

<head>

  <style>

*::before,
*::after {
  box-sizing: border-box;
}

</head>
<body>
  <div id="app-shell" class="split-only">
    <div class="workspace">
      <aside id="session-status" class="session-sidebar" aria-live="polite"></aside>
      <section class="panel split-panel" aria-label="Split View">
        <div id="split-view"></div>
      </section>
      <section class="panel full-panel" aria-label="Full Profile" hidden>
        <div id="full-profile"></div>
      </section>
    </div>
    <div id="onboarding-modal" hidden></div>
  </div>
  <script>
const SESSION_START_HOUR = 7;
const SESSION_START_MINUTE = 0;
const PERIOD_MINUTES = 30;
const INITIAL_PERIOD_COUNT = 19;
const VISIBLE_ROWS = 60;
const SCROLL_EDGE = 3;
const ROW_HEIGHT = 18;
const COL_WIDTH = 20;
const PRICE_COL_WIDTH = 58;
const VALUE_AREA_PCT = 0.688;
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const SESSION_END_LABEL = '16:30';

/** @deprecated use getMarket('bund').defaultStartPrice */
const START_PRICE = 125.5;
/** @deprecated use getMarket('bund').tickSize */
const TICK_SIZE = 0.01;

function pad2(n) {
  return String(n).padStart(2, '0');
}

function formatTime(totalMinutes) {
  const h = Math.floor(totalMinutes / 60) % 24;
  const m = totalMinutes % 60;
  return `${pad2(h)}:${pad2(m)}`;
}

function generatePeriods(count = INITIAL_PERIOD_COUNT) {
  const startMinutes = SESSION_START_HOUR * 60 + SESSION_START_MINUTE;
  const periods = [];

  for (let i = 0; i < count; i++) {
    const periodStart = startMinutes + i * PERIOD_MINUTES;
    const periodEnd = periodStart + PERIOD_MINUTES;
    periods.push({
      index: i,
      letter: LETTERS[i],
      timeRange: `${formatTime(periodStart)}â€“${formatTime(periodEnd)}`,
      label: `${LETTERS[i]} ${formatTime(periodStart)}â€“${formatTime(periodEnd)}`,
    });
  }

  return periods;
}

function computeInitialVisibleTickStart(openTickIndex = 0) {
  const targetRow = Math.floor((VISIBLE_ROWS - 1) / 2);
  return openTickIndex - (VISIBLE_ROWS - 1 - targetRow);
}

function tickIndexToVisibleRow(tickIndex, visibleTickStart) {
  return VISIBLE_ROWS - 1 - (tickIndex - visibleTickStart);
}

function priceAtTickIndex(tickIndex, startPrice, marketId = DEFAULT_MARKET_ID) {
  const { tickSize, priceFormat } = getMarket(marketId);
  const raw = startPrice + tickIndex * tickSize;
  if (priceFormat === 'integer') {
    return Math.round(raw);
  }
  return Number(raw.toFixed(2));
}

function tickIndexFromPrice(price, startPrice, marketId = DEFAULT_MARKET_ID) {
  const { tickSize } = getMarket(marketId);
  return Math.round((price - startPrice) / tickSize);
}

function getCell(grid, tickIndex, periodIndex) {
  return grid[`${tickIndex},${periodIndex}`] ?? null;
}

function setCell(grid, tickIndex, periodIndex, letter) {
  if (letter) {
    grid[`${tickIndex},${periodIndex}`] = letter;
  } else {
    delete grid[`${tickIndex},${periodIndex}`];
  }
}

function hasPrints(state) {
  return Object.keys(state.grid).length > 0;
}

function isOpenPrint(tickIndex, periodIndex, letter) {
  return tickIndex === 0 && periodIndex === 0 && letter === 'A';
}

function recomputeLastPrint(state) {
  let best = null;

  for (const key of Object.keys(state.grid)) {
    const [tick, period] = key.split(',').map(Number);
    if (
      !best
      || period > best.periodIndex
      || (period === best.periodIndex && tick > best.tickIndex)
    ) {
      best = { periodIndex: period, tickIndex: tick };
    }
  }

  state.lastPrint = best;
}

function clearPeriodColumn(state, periodIndex) {
  for (const key of Object.keys(state.grid)) {
    const [, period] = key.split(',').map(Number);
    if (period === periodIndex) {
      delete state.grid[key];
    }
  }

  recomputeLastPrint(state);
}

function restoreCursorAfterPeriodClear(state) {
  if (state.periodEntryCursor) {
    state.cursor = { ...state.periodEntryCursor };
  }
}

function snapshotPeriodEntry(state) {
  state.periodEntryCursor = { ...state.cursor };
}

function parseStartPrice(raw, marketId = DEFAULT_MARKET_ID) {
  return getMarket(marketId).parseOpenPrice(raw);
}

function clearSessionPrints(state) {
  state.grid = {};
  state.cursor = { periodIndex: 0, tickIndex: 0 };
  state.lastPrint = null;
  state.fullProfileRevealed = false;
  state.visibleTickStart = computeInitialVisibleTickStart(0);
  state.periodEntryCursor = null;
}

function applyStartPrice(state, raw) {
  const parsed = parseStartPrice(raw, state.marketId);
  if (!parsed.ok) return parsed;

  state.startPrice = parsed.value;
  clearSessionPrints(state);
  setCell(state.grid, 0, 0, 'A');
  state.lastPrint = { periodIndex: 0, tickIndex: 0 };

  return { ok: true };
}

function switchMarket(state, marketId) {
  if (state.marketId === marketId) {
    return { ok: true, changed: false };
  }

  const market = getMarket(marketId);
  state.marketId = marketId;
  state.startPrice = market.defaultStartPrice;
  clearSessionPrints(state);

  return { ok: true, changed: true };
}

function createInitialState() {
  const market = getMarket(DEFAULT_MARKET_ID);
  return {
    marketId: DEFAULT_MARKET_ID,
    grid: {},
    cursor: { periodIndex: 0, tickIndex: 0 },
    lastPrint: null,
    startPrice: market.defaultStartPrice,
    fullProfileRevealed: false,
    visibleTickStart: computeInitialVisibleTickStart(0),
    periodEntryCursor: null,
    periods: generatePeriods(),
  };
}

function resetState(state) {
  const savedStart = state.startPrice;
  const savedMarket = state.marketId;
  const fresh = createInitialState();
  fresh.marketId = savedMarket;
  fresh.startPrice = savedStart;
  Object.assign(state, fresh);
  return state;
}

function getActiveTickIndices(grid) {
  const ticks = new Set();
  for (const key of Object.keys(grid)) {
    const [tick] = key.split(',').map(Number);
    ticks.add(tick);
  }
  return [...ticks].sort((a, b) => a - b);
}

function mergeProfile(grid, periodCount = INITIAL_PERIOD_COUNT) {
  const ticks = getActiveTickIndices(grid);
  const merged = {};

  for (const tick of ticks) {
    let letters = '';
    for (let p = 0; p < periodCount; p++) {
      const letter = getCell(grid, tick, p);
      if (letter) letters += letter;
    }
    if (letters) merged[tick] = letters;
  }

  return merged;
}

function countTposPerRow(grid, periodCount = INITIAL_PERIOD_COUNT) {
  const merged = mergeProfile(grid, periodCount);
  const counts = {};
  for (const [tick, letters] of Object.entries(merged)) {
    counts[Number(tick)] = letters.length;
  }
  return counts;
}

function computePOC(counts) {
  const entries = Object.entries(counts).map(([tick, count]) => [Number(tick), count]);
  if (!entries.length) return null;

  entries.sort((a, b) => (b[1] - a[1]) || (a[0] - b[0]));
  return entries[0][0];
}

function computeValueArea(counts, pocIndex, pct = VALUE_AREA_PCT) {
  if (pocIndex == null) return [];

  const total = Object.values(counts).reduce((sum, n) => sum + n, 0);
  if (total === 0) return [];

  const target = Math.ceil(total * pct);
  const included = new Set([pocIndex]);
  let accumulated = counts[pocIndex] ?? 0;

  let up = pocIndex - 1;
  let down = pocIndex + 1;

  while (accumulated < target && (up in counts || down in counts)) {
    const upCount = up in counts ? counts[up] : -1;
    const downCount = down in counts ? counts[down] : -1;

    if (upCount >= downCount && upCount >= 0) {
      included.add(up);
      accumulated += upCount;
      up--;
    } else if (downCount >= 0) {
      included.add(down);
      accumulated += downCount;
      down++;
    } else {
      break;
    }
  }

  return [...included].sort((a, b) => a - b);
}

function computeIBR(grid) {
  let min = null;
  let max = null;

  for (const key of Object.keys(grid)) {
    const [tick, period] = key.split(',').map(Number);
    if (period !== 0 && period !== 1) continue;
    if (min === null || tick < min) min = tick;
    if (max === null || tick > max) max = tick;
  }

  if (min === null) return null;
  return { min, max };
}

function computeClose(lastPrint, startPrice) {
  if (!lastPrint) return null;
  return priceAtTickIndex(lastPrint.tickIndex, startPrice);
}

function computeAnalytics(state) {
  const counts = countTposPerRow(state.grid, state.periods.length);
  const pocIndex = computePOC(counts);
  const valueArea = computeValueArea(counts, pocIndex);
  const ibr = computeIBR(state.grid);
  const merged = mergeProfile(state.grid, state.periods.length);
  const closePrice = computeClose(state.lastPrint, state.startPrice);

  return { counts, pocIndex, valueArea, ibr, merged, closePrice, closeTick: state.lastPrint?.tickIndex ?? null };
}

function splitCornerLabel(marketId) {
  return getMarket(marketId).cornerLabel;
}

function splitCellClasses(tickIndex, periodIndex, letter) {
  const classes = ['split-cell'];
  if (letter) {
    if (isOpenPrint(tickIndex, periodIndex, letter)) {
      classes.push('open-print');
    } else if (letter === 'A' || letter === 'B') {
      classes.push('early-letter');
    }
  }
  return classes;
}

function ensureVisibleWindow(state) {
  const cursorOffset = state.cursor.tickIndex - state.visibleTickStart;

  if (cursorOffset < SCROLL_EDGE) {
    state.visibleTickStart = state.cursor.tickIndex - SCROLL_EDGE;
  } else if (cursorOffset >= VISIBLE_ROWS - SCROLL_EDGE) {
    state.visibleTickStart = state.cursor.tickIndex - (VISIBLE_ROWS - SCROLL_EDGE - 1);
  }
}

function renderSplitView(container, state) {
  ensureVisibleWindow(state);
  container.innerHTML = '';

  const table = document.createElement('div');
  table.className = 'split-grid';
  table.style.setProperty('--periods', state.periods.length);

  const corner = document.createElement('div');
  corner.className = 'split-corner';
  corner.textContent = splitCornerLabel(state.marketId);
  table.appendChild(corner);

  for (const period of state.periods) {
    const header = document.createElement('div');
    header.className = 'split-period-header';
    header.title = period.label;
    header.innerHTML = `<span class="period-letter">${period.letter}</span><span class="period-time">${period.timeRange}</span>`;
    table.appendChild(header);
  }

  for (let row = 0; row < VISIBLE_ROWS; row++) {
    const tickIndex = state.visibleTickStart + (VISIBLE_ROWS - 1 - row);

    const priceLabel = document.createElement('div');
    priceLabel.className = 'split-price' + (tickIndex === state.cursor.tickIndex ? ' cursor-price' : '');
    priceLabel.textContent = formatPrice(
      priceAtTickIndex(tickIndex, state.startPrice, state.marketId),
      state.marketId,
    );
    table.appendChild(priceLabel);

    for (let p = 0; p < state.periods.length; p++) {
      const letter = getCell(state.grid, tickIndex, p);
      const cell = document.createElement('div');
      cell.className = splitCellClasses(tickIndex, p, letter).join(' ');
      if (letter) {
        cell.textContent = letter;
      }
      if (tickIndex === state.cursor.tickIndex && p === state.cursor.periodIndex) {
        cell.classList.add('active-cursor');
      }
      table.appendChild(cell);
    }
  }

  container.appendChild(table);
}

function mergedLetterParts(tick, letters, hasOpenPrintAtTick) {
  if (!letters) return [];
  if (tick === 0 && hasOpenPrintAtTick) {
    return [...letters].map((ch, index) => ({ ch, open: index === 0 }));
  }
  return [{ ch: letters, open: false }];
}

function renderFullProfile(container, state, analytics) {
  container.innerHTML = '';

  if (!Object.keys(analytics.merged).length) {
    container.classList.add('empty');
    return;
  }

  container.classList.remove('empty');

  const ticks = Object.keys(analytics.merged).map(Number).sort((a, b) => b - a);
  const maxTick = ticks[0];
  const columnHeight = ticks.length * ROW_HEIGHT;
  const hasOpenPrintAtTick = getCell(state.grid, 0, 0) === 'A';

  const wrap = document.createElement('div');
  wrap.className = 'full-profile-wrap';

  const leftLane = document.createElement('div');
  leftLane.className = 'full-profile-lane full-profile-lane-left';
  leftLane.style.height = `${columnHeight}px`;

  if (analytics.ibr) {
    const ibr = document.createElement('div');
    ibr.className = 'ibr-bar';
    ibr.title = 'Initial Balance (A + B)';
    ibr.style.top = `${tickOffset(maxTick, analytics.ibr.max)}px`;
    ibr.style.height = `${(analytics.ibr.max - analytics.ibr.min + 1) * ROW_HEIGHT}px`;
    leftLane.appendChild(ibr);
  }

  const column = document.createElement('div');
  column.className = 'full-column';

  for (const tick of ticks) {
    const row = document.createElement('div');
    row.className = 'full-row';
    const isPoc = analytics.pocIndex === tick;
    const inVA = analytics.valueArea.includes(tick);

    if (isPoc) row.classList.add('is-poc');

    const cell = document.createElement('span');
    cell.className = 'full-letter' + (inVA && !isPoc ? ' in-va' : '');

    const parts = mergedLetterParts(tick, analytics.merged[tick], hasOpenPrintAtTick);
    if (parts.length === 1 && !parts[0].open) {
      cell.textContent = parts[0].ch;
    } else {
      for (const part of parts) {
        const span = document.createElement('span');
        span.className = 'full-letter-char' + (part.open ? ' open-print' : '');
        if (inVA && !isPoc && !part.open) span.classList.add('in-va');
        span.textContent = part.ch;
        cell.appendChild(span);
      }
    }

    row.appendChild(cell);
    column.appendChild(row);
  }

  const rightLane = document.createElement('div');
  rightLane.className = 'full-profile-lane full-profile-lane-right';
  rightLane.style.height = `${columnHeight}px`;

  if (analytics.closeTick != null) {
    const close = document.createElement('div');
    close.className = 'close-marker';
    close.style.top = `${tickOffset(maxTick, analytics.closeTick) + 4}px`;
    rightLane.appendChild(close);
  }

  wrap.appendChild(leftLane);
  wrap.appendChild(column);
  wrap.appendChild(rightLane);
  container.appendChild(wrap);
}

function tickOffset(maxTick, tick) {
  return (maxTick - tick) * ROW_HEIGHT;
}

function applyLayout(shell, state) {
  const revealed = state.fullProfileRevealed;
  shell.classList.toggle('side-by-side', revealed);
  shell.classList.toggle('split-only', !revealed);

  const fullPanel = shell.querySelector('.full-panel');
  if (fullPanel) {
    fullPanel.hidden = !revealed;
  }
}

function renderMarketOptions(marketId) {
  return listMarkets()
    .map((market) => {
      const selected = market.id === marketId ? ' selected' : '';
      return `<option value="${market.id}"${selected}>${market.label}</option>`;
    })
    .join('');
}

function renderSessionStatus(container, state) {
  const period = state.periods[state.cursor.periodIndex];
  const total = state.periods.length;
  const progressPct = total <= 1 ? 0 : (state.cursor.periodIndex / (total - 1)) * 100;

  const segments = state.periods.map((p, i) => {
    let cls = 'progress-segment';
    if (i < state.cursor.periodIndex) cls += ' done';
    else if (i === state.cursor.periodIndex) cls += ' current';
    return `<span class="${cls}" title="${p.label}">${p.letter}</span>`;
  }).join('');

  const sessionStarted = hasPrints(state);

  const guideBlock = sessionStarted
    ? `
      <p><kbd>â†‘</kbd> <kbd>â†“</kbd> price + print</p>
      <p><kbd>â†’</kbd> next period</p>
      <p><kbd>â†</kbd> previous</p>
      <p><kbd>Enter</kbd> show full profile</p>
      <p><kbd>Delete</kbd> erase cell</p>
      <p><kbd>X</kbd> clear current period</p>
      <p><kbd>R</kbd> reset session</p>
      <p class="status-teach">Build one period at a time. <kbd>X</kbd> redoes this bracket without resetting the whole session.</p>`
    : '';

  const cursorPrice = formatPrice(
    priceAtTickIndex(state.cursor.tickIndex, state.startPrice, state.marketId),
    state.marketId,
  );

  const statusBlock = sessionStarted
    ? `
    <div class="status-current">
      <div class="status-print"><span class="status-letter">${period.letter}</span> print</div>
      <div class="status-time">${period.timeRange}</div>
      <div class="status-price">@ ${cursorPrice}</div>
    </div>`
    : '';

  const guideSection = sessionStarted
    ? `
    <div class="status-guide">
      ${guideBlock}
      <p class="changelog-link"><a href="changelog.html">Changelog</a> Â· v1.2.4</p>
    </div>`
    : '';

  container.innerHTML = `
    <div class="market-picker">
      <label class="market-picker-label" for="market-select">Market</label>
      <select id="market-select" class="market-select" aria-label="Select market">
        ${renderMarketOptions(state.marketId)}
      </select>
    </div>
    <div class="session-progress">
      <div class="progress-title">07:00 â€“ 16:30</div>
      <div class="progress-v-layout">
        <div class="progress-v" role="progressbar" aria-valuenow="${Math.round(progressPct)}" aria-valuemin="0" aria-valuemax="100" aria-label="Session from 07:00 to 16:30">
          <span class="progress-start">07:00</span>
          <div class="progress-track-v">
            <div class="progress-fill-v" style="height: ${progressPct}%"></div>
          </div>
          <span class="progress-end">16:30</span>
        </div>
        <div class="progress-segments-v" aria-hidden="true">${segments}</div>
      </div>
    </div>
    ${statusBlock}
    ${guideSection}
  `;
}

const WELCOME_KEY = 'bund-tpo-builder.welcomeSeen';

let openPriceTrigger = 'load';

function getOpenPriceTrigger() {
  return openPriceTrigger;
}

function setOpenPriceTrigger(trigger) {
  openPriceTrigger = trigger;
}

function isWelcomeSeen() {
  try {
    return localStorage.getItem(WELCOME_KEY) === '1';
  } catch {
    return false;
  }
}

function markWelcomeSeen() {
  try {
    localStorage.setItem(WELCOME_KEY, '1');
  } catch {
    // private mode â€” ignore
  }
}

function computeModalMode(hasPrints) {
  if (hasPrints) return null;
  if (openPriceTrigger === 'reset') return 'reset';
  if (openPriceTrigger === 'market-switch') return 'open';
  if (!isWelcomeSeen()) return 'welcome';
  return 'open';
}

function openPriceHint(marketId) {
  const market = getMarket(marketId);
  if (market.priceFormat === 'integer') {
    return `Type a whole index point (e.g. ${market.openHint}), then press Enter to start period A.`;
  }
  return `Type a price with a decimal (e.g. ${market.openHint}), then press Enter to start period A.`;
}

function renderOnboardingModal(container, { mode, startPrice, marketId, error }) {
  if (!mode) {
    container.hidden = true;
    container.innerHTML = '';
    return;
  }

  const price = formatPriceForInput(startPrice, marketId);
  const hint = openPriceHint(marketId);
  const errorBlock = error
    ? `<p class="onboarding-error" role="alert">${error}</p>`
    : '';

  let title = 'Set open price';
  let body = '';

  if (mode === 'welcome') {
    title = 'Welcome to Bund TPO Builder';
    body = `
      <p class="onboarding-welcome">
        This teaching tool helps you see how a session develops as you build it letter by letter.
        Entering each print yourself gives you a kinesthetic feel for how the day unfolds â€”
        sharper questions and better expectations follow.
      </p>`;
  } else if (mode === 'open') {
    title = 'Set session open price';
    body = `
      <div class="onboarding-hints">
        <p><kbd>Enter</kbd> set open price</p>
        <p class="onboarding-teach">${hint}</p>
      </div>`;
  } else {
    body = `
      <p class="onboarding-teach">Press Enter to start period A at this price.</p>`;
  }

  const hintsAfterInput = mode === 'welcome'
    ? `
      <div class="onboarding-hints">
        <p><kbd>Enter</kbd> set open price</p>
        <p class="onboarding-teach">${hint}</p>
      </div>`
    : '';

  const inputMode = getMarket(marketId).priceFormat === 'integer' ? 'numeric' : 'decimal';

  container.hidden = false;
  container.innerHTML = `
    <div class="onboarding-backdrop">
      <div
        class="onboarding-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="onboarding-title"
      >
        <h2 id="onboarding-title" class="onboarding-title">${title}</h2>
        ${body}
        <label class="onboarding-field">
          <span class="onboarding-label">Open price</span>
          <input
            type="text"
            class="start-price-input"
            value="${price}"
            inputmode="${inputMode}"
            aria-label="Session open price"
          />
        </label>
        ${errorBlock}
        ${hintsAfterInput}
      </div>
    </div>
  `;
}

function handleKeyDown(event, state, onChange) {
  if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
    return;
  }

  const key = event.key;

  if (key === 'r' || key === 'R') {
    event.preventDefault();
    if (confirm('Reset session? All TPO prints will be cleared.')) {
      resetState(state);
      setOpenPriceTrigger('reset');
      onChange();
    }
    return;
  }

  if (!hasPrints(state)) {
    return;
  }

  if (key === 'ArrowUp') {
    event.preventDefault();
    state.cursor.tickIndex += 1;
    printAtCursor(state);
    onChange();
    return;
  }

  if (key === 'ArrowDown') {
    event.preventDefault();
    state.cursor.tickIndex -= 1;
    printAtCursor(state);
    onChange();
    return;
  }

  if (key === 'ArrowRight') {
    event.preventDefault();
    if (state.cursor.periodIndex < state.periods.length - 1) {
      snapshotPeriodEntry(state);
      state.cursor.periodIndex += 1;
      printAtCursor(state);
      onChange();
    }
    return;
  }

  if (key === 'ArrowLeft') {
    event.preventDefault();
    if (state.cursor.periodIndex > 0) {
      state.cursor.periodIndex -= 1;
      onChange();
    }
    return;
  }

  if (key === 'x' || key === 'X') {
    event.preventDefault();
    clearPeriodColumn(state, state.cursor.periodIndex);
    if (!hasPrints(state)) {
      state.fullProfileRevealed = false;
      setOpenPriceTrigger('reset');
    } else {
      restoreCursorAfterPeriodClear(state);
    }
    onChange();
    return;
  }

  if (key === 'Backspace' || key === 'Delete') {
    event.preventDefault();
    setCell(state.grid, state.cursor.tickIndex, state.cursor.periodIndex, null);
    if (!hasPrints(state)) {
      state.lastPrint = null;
      state.fullProfileRevealed = false;
      setOpenPriceTrigger('reset');
    }
    onChange();
    return;
  }

  if (key === 'Enter') {
    event.preventDefault();
    if (!state.fullProfileRevealed) {
      state.fullProfileRevealed = true;
      onChange();
    }
  }
}

function printAtCursor(state) {
  const letter = state.periods[state.cursor.periodIndex].letter;
  setCell(state.grid, state.cursor.tickIndex, state.cursor.periodIndex, letter);
  state.lastPrint = { ...state.cursor };
}

const state = createInitialState();
const shell = document.getElementById('app-shell');
const splitRoot = document.getElementById('split-view');
const fullRoot = document.getElementById('full-profile');
const statusRoot = document.getElementById('session-status');
const modalRoot = document.getElementById('onboarding-modal');

let lastPriceError = null;

function bindStartPriceInput() {
  const input = modalRoot.querySelector('.start-price-input');
  if (!input || input.dataset.bound === 'true') return;

  input.dataset.bound = 'true';
  input.addEventListener('keydown', (event) => {
    if (event.key !== 'Enter') return;

    event.preventDefault();
    event.stopPropagation();

    const result = applyStartPrice(state, input.value);
    if (!result.ok) {
      lastPriceError = result.error;
      render();
      return;
    }

    lastPriceError = null;
    markWelcomeSeen();
    setOpenPriceTrigger('load');
    render();
  });

  input.focus();
  input.select();
}

function bindMarketSelect() {
  const select = statusRoot.querySelector('.market-select');
  if (!select || select.dataset.bound === 'true') return;

  select.dataset.bound = 'true';
  select.addEventListener('change', () => {
    const result = switchMarket(state, select.value);
    if (!result.changed) return;

    lastPriceError = null;
    setOpenPriceTrigger('market-switch');
    render();
  });
}

function render() {
  applyLayout(shell, state);
  renderSplitView(splitRoot, state);
  renderSessionStatus(statusRoot, state);
  bindMarketSelect();

  const modalMode = computeModalMode(hasPrints(state));
  renderOnboardingModal(modalRoot, {
    mode: modalMode,
    startPrice: state.startPrice,
    marketId: state.marketId,
    error: lastPriceError,
  });

  if (!hasPrints(state)) {
    bindStartPriceInput();
  } else {
    lastPriceError = null;
  }

  if (state.fullProfileRevealed && hasPrints(state)) {
    const analytics = computeAnalytics(state);
    renderFullProfile(fullRoot, state, analytics);
  } else if (fullRoot) {
    fullRoot.innerHTML = '';
    fullRoot.classList.add('empty');
  }
}

window.addEventListener('keydown', (event) => {
  handleKeyDown(event, state, render);
});

render();
  </script>
